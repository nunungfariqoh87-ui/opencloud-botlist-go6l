<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCloud Bot List - GitHub Deployment</title>
    <meta name="description" content="Daftar bot Discord terbaik yang dihosting di infrastruktur GitHub Pages melalui OpenCloud.">
    <meta name="robots" content="index, follow">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .github-card { background: #161b22; border: 1px solid #30363d; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="github-card p-10 rounded-2xl shadow-2xl text-center max-w-lg">
        <i data-lucide="github" class="w-20 h-20 mx-auto text-white mb-6"></i>
        <h1 class="text-3xl font-bold mb-4">Migrasi ke GitHub Sukses!</h1>
        <p class="mb-8 text-gray-400">Website Anda sekarang telah berhasil dipindahkan dan dideploy ke infrastruktur GitHub Pages.</p>
        <a href="https://github.com/OpenCloud-Deploy/opencloud-botlist" class="bg-[#238636] hover:bg-[#2ea043] text-white font-bold py-3 px-6 rounded-lg transition">
            Lihat Repository GitHub
        </a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
